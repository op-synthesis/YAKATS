name: yakats
description: AI-Powered Personal Allergy Tracking System
publish_to: 'none'

platforms:
  android:

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  
  google_fonts: ^6.1.0
  video_player: ^2.9.2
  lottie: ^2.7.0
  cupertino_icons: ^1.0.2
  flutter_screenutil: ^5.9.0
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.0
  go_router: ^13.0.0
  intl: ^0.20.2
  timeago: ^3.6.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.3
  geolocator: ^9.0.2
  geocoding: ^2.1.1
  http: ^1.1.0
  fl_chart: ^0.66.0
  awesome_notifications: ^0.11.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
    - assets/icons/